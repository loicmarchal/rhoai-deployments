MIN_REPLICAS="0"
SHM_SIZE="2Gi"
DOWNLOAD_TIMEOUT="600"
DL_CPU_REQ="500m"
DL_CPU_LIMIT="1"
DL_MEM_REQ="1Gi"
DL_MEM_LIMIT="2Gi"
